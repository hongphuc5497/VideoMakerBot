services:
  gui:
    build:
      context: .
    image: videomakerbot:latest
    command: ["python", "GUI.py"]
    ports:
      - "4000:4000"
    environment:
      GUI_HOST: "0.0.0.0"
      GUI_PORT: "4000"
      GUI_OPEN_BROWSER: "0"
      GUI_BROWSER_URL: "http://localhost:4000"
      XDG_CACHE_HOME: "/app/.cache"
      CLOAKBROWSER_CACHE_DIR: "/app/.cache/cloakbrowser"
    volumes:
      - ./:/app
    shm_size: "1gb"

  cli:
    build:
      context: .
    image: videomakerbot:latest
    command: ["python", "main.py"]
    environment:
      PYTHONUNBUFFERED: "1"
      XDG_CACHE_HOME: "/app/.cache"
      CLOAKBROWSER_CACHE_DIR: "/app/.cache/cloakbrowser"
    volumes:
      - ./:/app
    shm_size: "1gb"

  test:
    build:
      context: .
    image: videomakerbot:latest
    command: ["pytest", "tests/", "-v"]
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
      XDG_CACHE_HOME: "/app/.cache"
      CLOAKBROWSER_CACHE_DIR: "/app/.cache/cloakbrowser"
    volumes:
      - ./:/app
    shm_size: "1gb"
